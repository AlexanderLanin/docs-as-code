name: Measure Docs Performance

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *" # daily at 04:00 UTC

jobs:
  build-docs:
    runs-on: ${{ vars.REPO_RUNNER_LABELS && fromJSON(vars.REPO_RUNNER_LABELS) || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4.2.2

      - name: "Setup Caching: Sphinx"
        uses: actions/cache@v4
        with:
          path: ./_build
          # For clean incremental builds, the cache can only be reused as long as the tool is identical
          key: sphinx-${{ hashFiles('src/**/*.py') }}

      - name: "Setup Caching: Bazel"
        uses: bazel-contrib/setup-bazel@0.14.0
        with:
          # Fetch bazelisk from cache
          bazelisk-cache: true

          # Normal bazel caching
          disk-cache: true

          # Cache all those http downloads etc
          repository-cache: true

      - name: Install Graphviz
        uses: eclipse-score/apt-install@main
        with:
          packages: graphviz
          # TODO: fix install from cache, see https://github.com/awalsh128/cache-apt-pkgs-action#caveats
          cache: false

      - name: "Debug: Bazel repo cache"
        run: |
          bazel info repository_cache
          du -sh "$(bazel info repository_cache)" || true
          ls -1 "$(bazel info repository_cache)" | wc -l || true

      - name: "Prepare build"
        run: |
          bazel build //:docs --nobuild --profile=profile.json --record_full_profiler_data

      - name: "Archive profile.json"
        uses: actions/upload-artifact@v4
        with:
          name: profile_for_prebuild
          path: profile.json

      - name: "build"
        run: |
          bazel build //:docs --profile=profile.json --record_full_profiler_data

      - name: "Archive profile.json"
        uses: actions/upload-artifact@v4
        with:
          name: profile_for_build
          path: profile.json

      - id: build-docs
        name: Build documentation (timed)
        run: |
          start=$(date +%s)
          bazel run //:docs
          end=$(date +%s)
          echo "duration_seconds=$((end-start))" >> "$GITHUB_OUTPUT"

      - name: Publish timing to job summary
        run: |
          echo "### Docs build time: ${{ steps.build-docs.outputs.duration_seconds }} s" >> "$GITHUB_STEP_SUMMARY"

      - name: Save metrics artifact
        run: |
          printf '{"ts":"%s","duration_s":%s}\n' "$(date -u +%FT%TZ)" "${{ steps.build-docs.outputs.duration_seconds }}" > metrics.json

      - uses: actions/upload-artifact@v4
        with:
          name: docs-build-metrics
          path: metrics.json
          retention-days: 90
